<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>type7_partial_moving_rect</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #101010;
      cursor: none;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #101010;
    }
  </style>
</head>
<body>
<canvas id="pattern" width="1920" height="1080"></canvas>
<script>
const WIDTH = 1920;
const HEIGHT = 1080;
const FPS = 30;
const canvas = document.getElementById("pattern");
const ctx = canvas.getContext("2d", { alpha: false });
let running = false;

function drawBackground() {
  ctx.fillStyle = "#101010";
  ctx.fillRect(0, 0, WIDTH, HEIGHT);
  ctx.strokeStyle = "#2e2e2e";
  ctx.lineWidth = 1;
  for (let x = 0; x <= WIDTH; x += 120) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, HEIGHT);
    ctx.stroke();
  }
  for (let y = 0; y <= HEIGHT; y += 90) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(WIDTH, y);
    ctx.stroke();
  }
  ctx.fillStyle = "#d0d0d0";
  ctx.font = "24px monospace";
  ctx.fillText("type7_partial_moving_rect 1920x1080 fixed grid", 28, 44);
}

function drawRect(frame, rectW, rectH, axis) {
  drawBackground();
  const spanX = WIDTH - rectW - 120;
  const spanY = HEIGHT - rectH - 160;
  const phase = (frame % 120) / 119;
  const wave = Math.round((Math.sin(phase * Math.PI * 2 - Math.PI / 2) + 1) * 0.5 * 1_000) / 1_000;
  const x = axis === "x" ? 60 + Math.round(spanX * wave) : 860;
  const y = axis === "y" ? 100 + Math.round(spanY * wave) : 460;
  ctx.fillStyle = "#0057ff";
  ctx.fillRect(x, y, rectW, rectH);
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(x + 12, y + 12, rectW - 24, rectH - 24);
  ctx.fillStyle = "#111111";
  ctx.font = "28px monospace";
  ctx.fillText(`${rectW}x${rectH} ${axis} frame=${frame}`, x + 22, y + 52);
  console.log("frame", frame, "rect", x, y, rectW, rectH, axis);
}

async function segment(label, seconds, rectW, rectH, axis, startFrame) {
  console.log("segment", label, rectW, rectH, axis);
  const frames = seconds * FPS;
  for (let i = 0; i < frames; i++) {
    drawRect(startFrame + i, rectW, rectH, axis);
    await new Promise(resolve => setTimeout(resolve, 1000 / FPS));
  }
  return startFrame + frames;
}

async function run() {
  if (running) return;
  running = true;
  if (document.documentElement.requestFullscreen) {
    try { await document.documentElement.requestFullscreen(); } catch (_) {}
  }
  console.log("type7-partial-moving-rect-start", new Date().toISOString());
  let frame = 0;
  frame = await segment("small_horizontal", 4, 200, 120, "x", frame);
  frame = await segment("medium_horizontal", 4, 640, 360, "x", frame);
  frame = await segment("small_vertical", 4, 200, 120, "y", frame);
  frame = await segment("medium_vertical", 4, 640, 360, "y", frame);
  drawBackground();
  console.log("type7-partial-moving-rect-done", new Date().toISOString());
  running = false;
}

drawBackground();
window.addEventListener("keydown", event => {
  if (event.code === "Space" || event.code === "Enter") run();
});
window.addEventListener("pointerdown", run);
</script>
</body>
</html>
