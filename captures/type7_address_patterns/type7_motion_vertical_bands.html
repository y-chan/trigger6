<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>type7_motion_vertical_bands</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      cursor: none;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #000;
    }
  </style>
</head>
<body>
<canvas id="pattern" width="1920" height="1080"></canvas>
<script>
const WIDTH = 1920;
const HEIGHT = 1080;
const STEPS = [{"label":"black_start","duration_ms":2000,"x":null,"y":null,"w":192,"h":1080,"color":"#ffffff"},{"label":"band_x0_192x1080","duration_ms":1000,"x":0,"y":0,"w":192,"h":1080,"color":"#ffffff"},{"label":"band_x192_192x1080","duration_ms":1000,"x":192,"y":0,"w":192,"h":1080,"color":"#ffffff"},{"label":"band_x384_192x1080","duration_ms":1000,"x":384,"y":0,"w":192,"h":1080,"color":"#ffffff"},{"label":"band_x768_192x1080","duration_ms":1000,"x":768,"y":0,"w":192,"h":1080,"color":"#ffffff"},{"label":"band_x1152_192x1080","duration_ms":1000,"x":1152,"y":0,"w":192,"h":1080,"color":"#ffffff"},{"label":"band_x1536_192x1080","duration_ms":1000,"x":1536,"y":0,"w":192,"h":1080,"color":"#ffffff"},{"label":"band_x1728_192x1080","duration_ms":1000,"x":1728,"y":0,"w":192,"h":1080,"color":"#ffffff"},{"label":"black_end","duration_ms":1000,"x":null,"y":null,"w":192,"h":1080,"color":"#ffffff"}];
const canvas = document.getElementById("pattern");
const ctx = canvas.getContext("2d", { alpha: false });
let running = false;

function draw(step) {
  ctx.fillStyle = "rgb(0,0,0)";
  ctx.fillRect(0, 0, WIDTH, HEIGHT);
  if (step.x !== null && step.y !== null) {
    ctx.fillStyle = step.color || "#ffffff";
    ctx.fillRect(step.x, step.y, step.w, step.h);
  }
}

async function run() {
  if (running) return;
  running = true;
  if (document.documentElement.requestFullscreen) {
    try { await document.documentElement.requestFullscreen(); } catch (_) {}
  }
  console.log("type7-address-pattern-start", new Date().toISOString());
  for (const [index, step] of STEPS.entries()) {
    console.log("step", index + 1, step.label, step.x, step.y, step.w, step.h, step.duration_ms);
    draw(step);
    await new Promise(resolve => setTimeout(resolve, step.duration_ms));
  }
  draw({ label: "black_done", x: null, y: null, w: 0, h: 0, duration_ms: 0 });
  console.log("type7-address-pattern-done", new Date().toISOString());
  running = false;
}

draw(STEPS[0]);
window.addEventListener("keydown", event => {
  if (event.code === "Space" || event.code === "Enter") run();
});
window.addEventListener("pointerdown", run);
</script>
</body>
</html>
